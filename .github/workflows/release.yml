name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    environment: release-prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Host-JVM unit tests (no device needed) for transport, models, scopes,
      # breadcrumbs, the data scrubber, retry policy, offline spool, sessions,
      # and the OkHttp/Timber integrations.
      - name: Test
        run: ./gradlew testDebugUnitTest --no-daemon

      # Aggregates the `release` publication of all three modules into one
      # bundle and uploads it to the Sonatype Central Portal. The bundle is
      # GPG-signed (Central rejects unsigned deployments) using the in-memory
      # key from MAVEN_GPG_PRIVATE_KEY / MAVEN_GPG_PASSPHRASE, and authenticated
      # with the Central Portal token in MAVEN_CENTRAL_USERNAME / _PASSWORD.
      - name: Publish to Central Portal
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --no-configuration-cache
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
